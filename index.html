<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>protondrian</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #00ff88;
      --green-dim: #00aa55;
      --green-dark: #003322;
      --bg: #0a0f0a;
      --text: #c8ffd4;
      --cursor: #00ff88;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', Courier, monospace;
      font-size: 15px;
      line-height: 1.6;
      overflow: hidden;
    }

    /* scanlines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.07) 2px,
        rgba(0,0,0,0.07) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    #screen {
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 24px 32px;
      overflow: hidden;
    }

    #output {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--green-dim) transparent;
    }

    #output::-webkit-scrollbar { width: 4px; }
    #output::-webkit-scrollbar-thumb { background: var(--green-dim); border-radius: 2px; }

    .line { margin-bottom: 2px; white-space: pre-wrap; word-break: break-word; }
    .line.dim { color: var(--green-dim); }
    .line.bright { color: var(--green); }
    .line.empty { min-height: 1.6em; }
    .line.error { color: #ff5555; }

    .prompt-line {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 16px;
      border-top: 1px solid var(--green-dark);
      padding-top: 12px;
    }

    .prompt-symbol {
      color: var(--green);
      user-select: none;
      white-space: nowrap;
    }

    #cmd-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--green);
      font-family: inherit;
      font-size: inherit;
      caret-color: var(--cursor);
    }

    .shortcuts {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .shortcut-btn {
      background: transparent;
      border: 1px solid var(--green-dim);
      color: var(--green-dim);
      font-family: inherit;
      font-size: 13px;
      padding: 3px 12px;
      cursor: pointer;
      transition: all 0.15s;
      border-radius: 2px;
    }

    .shortcut-btn:hover {
      border-color: var(--green);
      color: var(--green);
      background: var(--green-dark);
    }

    a { color: var(--green); text-decoration: underline; }
    a:hover { color: #fff; }

    .blink {
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    .typed { display: inline; }

    @media (max-width: 600px) {
      #screen { padding: 16px; font-size: 13px; }
    }
  </style>
</head>
<body>
  <div id="screen">
    <div id="output"></div>

    <div class="shortcuts" id="shortcuts">
      <button class="shortcut-btn" onclick="runCmd('about')">about</button>
      <button class="shortcut-btn" onclick="runCmd('projects')">projects</button>
      <button class="shortcut-btn" onclick="runCmd('links')">links</button>
      <button class="shortcut-btn" onclick="runCmd('contact')">contact</button>
      <button class="shortcut-btn" onclick="runCmd('clear')">clear</button>
    </div>

    <div class="prompt-line">
      <span class="prompt-symbol">visitor@protondrian.dev:~$</span>
      <input id="cmd-input" type="text" autocomplete="off" autocorrect="off"
             spellcheck="false" autofocus placeholder="type a command..." />
    </div>
  </div>

  <script>
    const output = document.getElementById('output');
    const input  = document.getElementById('cmd-input');

    const COMMANDS = {
      help: cmdHelp,
      about: cmdAbout,
      projects: cmdProjects,
      links: cmdLinks,
      contact: cmdContact,
      clear: cmdClear,
      whoami: () => print('protondrian', 'bright'),
    };

    // ── helpers ──────────────────────────────────────────────────────────────

    function print(text = '', cls = '') {
      const div = document.createElement('div');
      div.className = 'line' + (cls ? ' ' + cls : '');
      if (text === '') div.classList.add('empty');
      div.innerHTML = text;
      output.appendChild(div);
      output.scrollTop = output.scrollHeight;
      return div;
    }

    function printTyped(text, cls = '', delay = 18) {
      return new Promise(resolve => {
        const div = document.createElement('div');
        div.className = 'line' + (cls ? ' ' + cls : '');
        output.appendChild(div);
        let i = 0;
        // strip html tags for typing; just set innerHTML at end if it has links
        const hasHtml = /<[a-z]/i.test(text);
        if (hasHtml) {
          div.innerHTML = text;
          output.scrollTop = output.scrollHeight;
          resolve();
          return;
        }
        const interval = setInterval(() => {
          div.textContent += text[i++];
          output.scrollTop = output.scrollHeight;
          if (i >= text.length) { clearInterval(interval); resolve(); }
        }, delay);
      });
    }

    function printEcho(cmd) {
      print(`visitor@protondrian.dev:~$ ${cmd}`, 'dim');
    }

    async function boot() {
      await sleep(200);
      await printTyped('protondrian.dev  v0.0.?', 'bright', 30);
      await sleep(100);
      await printTyped('initializing...', 'dim', 25);
      await sleep(400);
      print('', '');
      await printTyped('hello. welcome to my terminal.', '', 28);
      await sleep(200);
      print('type a command or click a button below.', 'dim');
      print('');
      print('  <span style="color:var(--green)">help</span>       show available commands', 'dim');
      print('  <span style="color:var(--green)">about</span>      who is protondrian?', 'dim');
      print('  <span style="color:var(--green)">projects</span>   things i built', 'dim');
      print('  <span style="color:var(--green)">links</span>      find me online', 'dim');
      print('');
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    // ── commands ─────────────────────────────────────────────────────────────

    function cmdHelp() {
      print('');
      print('available commands:', 'bright');
      print('');
      const cmds = [
        ['about',    'who is protondrian?'],
        ['projects', 'things i built'],
        ['links',    'find me online'],
        ['contact',  'get in touch'],
        ['whoami',   'obvious'],
        ['clear',    'clear the terminal'],
        ['help',     'show this message'],
      ];
      cmds.forEach(([cmd, desc]) => {
        print(`  <span style="color:var(--green)">${cmd.padEnd(12)}</span>${desc}`, '');
      });
      print('');
    }

    function cmdAbout() {
      print('');
      print('> about protondrian', 'bright');
      print('');
      print('  developer. tinkerer. music nerd.');
      print('');
      print('  i build tools that scratch my own itch —');
      print('  mostly for music, automation and desktop apps.');
      print('');
      print('  stack: C# / .NET / WPF / JS / bash / whatever it takes.');
      print('');
    }

    function cmdProjects() {
      print('');
      print('> projects', 'bright');
      print('');
      print('  <span style="color:var(--green)">portfolio</span>  &nbsp; this site. terminal-style portfolio.', '');
      print('           &nbsp; <a href="https://github.com/protondrian/portfolio" target="_blank">github.com/protondrian/portfolio</a>');
      print('');
      print('  <span style="color:var(--green)">sldl-gui</span>   &nbsp; WPF GUI for slsk-batchdl, a Soulseek batch downloader.');
      print('           &nbsp; <a href="https://github.com/protondrian/slsk-batchdl" target="_blank">github.com/protondrian/slsk-batchdl</a>');
      print('');
      print('  <span style="color:var(--green)">arminschroetter</span> &nbsp; für die kunst.');
      print('           &nbsp; <a href="https://github.com/protondrian/arminschroetter" target="_blank">github.com/protondrian/arminschroetter</a>');
      print('');
    }

    function cmdLinks() {
      print('');
      print('> links', 'bright');
      print('');
      print('  <a href="https://github.com/protondrian" target="_blank">github.com/protondrian</a>');
      print('');
    }

    function cmdContact() {
      print('');
      print('> contact', 'bright');
      print('');
      print('  best way to reach me: GitHub issues or discussions.');
      print('  <a href="https://github.com/protondrian" target="_blank">github.com/protondrian</a>');
      print('');
    }

    function cmdClear() {
      output.innerHTML = '';
    }

    function cmdUnknown(cmd) {
      print(`command not found: ${cmd}`, 'error');
      print('type <span style="color:var(--green)">help</span> for available commands.', 'dim');
    }

    // ── input handling ───────────────────────────────────────────────────────

    function runCmd(raw) {
      const cmd = raw.trim().toLowerCase();
      if (!cmd) return;
      printEcho(cmd);
      if (COMMANDS[cmd]) COMMANDS[cmd]();
      else cmdUnknown(cmd);
      input.value = '';
      input.focus();
    }

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') runCmd(input.value);
    });

    // keep focus on input when clicking anywhere
    document.addEventListener('click', e => {
      if (!e.target.closest('a') && !e.target.closest('button')) input.focus();
    });

    // ── boot ─────────────────────────────────────────────────────────────────
    boot();
  </script>
</body>
</html>
